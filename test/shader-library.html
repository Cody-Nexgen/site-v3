<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shader Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--s1:#111;--s2:#1a1a1a;--b1:#222;--b2:#333;--tx:#f0f0f0;--mu:#555;--ac:#7c5cfc;--ac2:#fc5c7d;--gr:#4ade80;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;min-height:100vh;}
header{padding:28px 28px 0;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.logo em{color:var(--ac);font-style:normal;}
.hright{display:flex;align-items:center;gap:10px;}
.cnt{font-size:11px;color:var(--mu);}
.filters{padding:16px 28px 0;display:flex;gap:6px;flex-wrap:wrap;}
.fb{font-size:10px;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--mu);cursor:pointer;transition:all .15s;letter-spacing:.03em;}
.fb:hover{border-color:var(--ac);color:var(--ac);}
.fb.on{background:var(--ac);border-color:var(--ac);color:#fff;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:16px 28px 32px;}
.card{border-radius:12px;background:var(--s1);border:1px solid var(--b1);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative;}
.card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.card.sel{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac);}
.thumb{width:100%;height:115px;display:block;position:relative;overflow:hidden;}
.thumb canvas{width:100%;height:100%;display:block;}
.clabel{padding:7px 10px 9px;display:flex;justify-content:space-between;align-items:flex-end;}
.cname{font-size:11px;font-weight:500;color:var(--tx);}
.ctag{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;}
.mouse-badge{position:absolute;top:6px;right:6px;font-size:8px;background:rgba(0,0,0,.7);border:1px solid var(--b2);border-radius:10px;padding:2px 6px;color:#aaa;letter-spacing:.04em;}

/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(6px);}
.ov.open{display:flex;}
.mo{background:var(--s1);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column;}
.mo-top{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--b1);}
.mo-left{display:flex;align-items:center;gap:10px;}
.mo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:500;}
.mo-pill{font-size:9px;padding:3px 9px;border-radius:12px;background:var(--s2);border:1px solid var(--b2);color:var(--mu);letter-spacing:.06em;text-transform:uppercase;}
.mo-mouse{font-size:9px;padding:3px 9px;border-radius:12px;background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.4);color:var(--ac);letter-spacing:.04em;}
.xbtn{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1;padding:0 2px;}
.xbtn:hover{color:var(--tx);}
.mo-pv{width:100%;height:240px;background:#000;position:relative;overflow:hidden;flex-shrink:0;}
.mo-pv canvas{width:100%;height:100%;display:block;}
.mo-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px;}
.tabs{display:flex;gap:0;border:1px solid var(--b2);border-radius:8px;overflow:hidden;width:fit-content;}
.tab{font-size:10px;font-family:'DM Mono',monospace;padding:6px 13px;background:transparent;border:none;color:var(--mu);cursor:pointer;transition:all .12s;letter-spacing:.03em;}
.tab.on{background:var(--s2);color:var(--tx);}
.code-wrap{background:#0a0a0a;border:1px solid var(--b1);border-radius:10px;overflow:hidden;}
.code-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--b1);}
.code-lang{font-size:9px;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;}
.code-block{padding:12px 14px;font-size:10.5px;font-family:'DM Mono',monospace;color:#c9d1d9;white-space:pre;overflow-x:auto;max-height:300px;overflow-y:auto;line-height:1.65;}
.copy-btn{font-size:10px;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;transition:all .15s;}
.copy-btn:hover{border-color:var(--ac);color:var(--ac);}
.copy-btn.done{border-color:var(--gr);color:var(--gr);}

/* markdown doc section */
.doc-block{background:#0a0a0a;border:1px solid var(--b1);border-radius:10px;padding:14px 16px;font-size:10.5px;line-height:1.75;color:#bbb;max-height:280px;overflow-y:auto;}
.doc-block h3{font-size:12px;color:var(--tx);margin-bottom:6px;font-weight:500;}
.doc-block code{background:var(--s2);padding:1px 5px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);}
.doc-block ul{padding-left:16px;margin:4px 0;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div><div class="logo">shader<em>.</em>lib</div></div>
  <div class="hright"><span class="cnt" id="cnt">40 shaders</span></div>
</header>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>

<div class="ov" id="ov">
  <div class="mo">
    <div class="mo-top">
      <div class="mo-left">
        <span class="mo-name" id="m-name"></span>

      </div>

    </div>
    <div class="mo-pv"><canvas id="m-cv"></canvas></div>
    <div class="mo-body">
      <div class="tabs">

      </div>
      <div id="code-area"></div>
    </div>
  </div>
</div>

<script>
// ── HELPERS ──────────────────────────────────────────────────────────────────
function hsl(h,s,l){h=((h%360)+360)%360;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let r=0,g=0,b=0;if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];}
function hash2(ax,ay){const s=Math.sin(ax*127.1+ay*311.7)*43758.5453;return s-Math.floor(s);}
function vnoise(ax,ay){const ix=Math.floor(ax),iy=Math.floor(ay),fx=ax-ix,fy=ay-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash2(ix,iy)*(1-ux)*(1-uy)+hash2(ix+1,iy)*ux*(1-uy)+hash2(ix,iy+1)*(1-ux)*uy+hash2(ix+1,iy+1)*ux*uy;}
function fbm(x,y,oct){let v=0,a=1,f=1;for(let i=0;i<oct;i++){v+=a*(vnoise(x*f,y*f)*2-1);a*=.5;f*=2;}return v;}

// ── ALL SHADERS ───────────────────────────────────────────────────────────────
const SHADERS = [

// ─ NEW SHADERS ─────────────────────────────────────────────────────────────
{name:'Mercury 1',tag:'logo',
 doc:`Mercury 1 creates an iridescent chrome sphere mask — perfect as a logo cutout or hero element.

**How it works:** Layered radial gradients + fbm noise simulate metallic sheen. The arc shape comes from masking a circle with a rotated rectangle cutout.

**Customize:**
- \`colors\` array → change the iridescent hue range
- \`noiseScale\` → tighter (0.003) = smoother chrome, higher (0.01) = more chaotic
- Change the cutout rect to any shape (triangle, letter path)

**On a website:**
\`\`\`html
<canvas id="mercury" width="400" height="400"></canvas>
\`\`\`
Place in a \`position:relative\` container. Use \`mix-blend-mode: screen\` over a dark background for a glow effect. Great for logos, loading screens, or card heroes.`,
 css:`/* Mercury-style iridescent ring — CSS approximation */
.mercury {
  width: 200px; height: 200px;
  border-radius: 50%;
  background: conic-gradient(
    from 120deg,
    #4fd1c5, #63b3ed, #b794f4,
    #ed8936, #4fd1c5
  );
  -webkit-mask: radial-gradient(
    transparent 35%, black 36%, black 100%
  );
  mask: radial-gradient(transparent 35%, black 36%, black 100%);
  animation: mercSpin 8s linear infinite;
}
@keyframes mercSpin { to { filter: hue-rotate(360deg); } }`,
 react:`import { useEffect, useRef } from 'react';
export function Mercury1({ size = 400 }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current, ctx = canvas.getContext('2d');
    let raf, t = 0;
    const draw = () => {
      const w = size, h = size;
      ctx.clearRect(0, 0, w, h);
      // Draw chrome sphere
      ctx.save();
      ctx.beginPath();
      ctx.arc(w/2, h/2, w*0.44, 0, Math.PI*2);
      ctx.clip();
      const id = ctx.getImageData(0, 0, w, h);
      for (let px = 0; px < w; px += 2) for (let py = 0; py < h; py += 2) {
        const nx = px/w, ny = py/h;
        const dx = nx-0.5, dy = ny-0.5;
        const r = Math.sqrt(dx*dx+dy*dy);
        const n = fbm(nx*4+t*0.1, ny*4, 4)*0.5+fbm(nx*6-t*0.08, ny*6, 3)*0.3;
        const hue = ((Math.atan2(dy,dx)/(Math.PI*2)+0.5)*200 + n*120 + t*15) % 360;
        const light = 0.4 + n*0.3 + (1-r*1.8)*0.3;
        const [red,grn,blu] = hsl(hue, 0.7, Math.max(0.1, Math.min(0.9, light)));
        for (let dx2=0;dx2<2;dx2++) for(let dy2=0;dy2<2;dy2++){
          const i=((py+dy2)*w+(px+dx2))*4;
          id.data[i]=red;id.data[i+1]=grn;id.data[i+2]=blu;id.data[i+3]=255;
        }
      }
      ctx.putImageData(id, 0, 0);
      ctx.restore();
      // Cutout square
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'black';
      ctx.save();
      ctx.translate(w*0.55, h*0.55);
      ctx.rotate(Math.PI*0.05);
      ctx.fillRect(-w*0.15, -h*0.15, w*0.22, h*0.22);
      ctx.restore();
      ctx.globalCompositeOperation = 'source-over';
      t += 0.016; raf = requestAnimationFrame(draw);
    };
    draw(); return () => cancelAnimationFrame(raf);
  }, [size]);
  return <canvas ref={ref} width={size} height={size} style={{background:'#000'}} />;
}`,
 draw(ctx,w,h,t,mx,my){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
  ctx.save();
  ctx.beginPath();ctx.arc(w/2,h/2,w*0.44,0,Math.PI*2);ctx.clip();
  const id=ctx.getImageData(0,0,w,h);
  for(let px=0;px<w;px+=2){for(let py=0;py<h;py+=2){
    const nx=px/w,ny=py/h,dx=nx-.5,dy=ny-.5;
    const r=Math.sqrt(dx*dx+dy*dy);
    const n=fbm(nx*4+t*.1,ny*4,4)*.5+fbm(nx*6-t*.08,ny*6,3)*.3;
    const hueA=(Math.atan2(dy,dx)/(Math.PI*2)+.5)*200+n*120+t*15;
    const light=.4+n*.3+(1-r*1.8)*.3;
    const [r2,g2,b2]=hsl(hueA%360,.7,Math.max(.1,Math.min(.9,light)));
    for(let a=0;a<2;a++){for(let b2b=0;b2b<2;b2b++){const i=((py+b2b)*w+(px+a))*4;id.data[i]=r2;id.data[i+1]=g2;id.data[i+2]=b2;id.data[i+3]=255;}}
  }}
  ctx.putImageData(id,0,0);ctx.restore();
  ctx.globalCompositeOperation='destination-out';
  ctx.fillStyle='rgba(0,0,0,1)';
  ctx.save();ctx.translate(w*.55,h*.55);ctx.rotate(.15);
  ctx.fillRect(-w*.13,-h*.13,w*.2,h*.2);ctx.restore();
  ctx.globalCompositeOperation='source-over';
 }
},

{name:'Embossed Relief',tag:'logo',
 doc:`Embossed Relief creates a 3D raised-surface effect — works beautifully as a logo background or hero card texture.

**How it works:** FBM noise is used to fake a height map, then a fake "light source" shines from the top-left — pixels facing the light are bright, facing away are dark — creating the illusion of raised material.

**Customize:**
- \`lightAngle\` → 0 = top-left, Math.PI = bottom-right
- \`bumpScale\` → larger = more dramatic relief
- \`baseColor\` → change from warm white to any material (gold, slate, etc.)
- Add a circular clip for a coin/seal look

**On a website:**
\`\`\`css
canvas { mix-blend-mode: multiply; }
\`\`\`
Overlay on a paper-texture background. Use as a watermark behind text. Great for premium SaaS hero sections.`,
 css:`/* Embossed look via CSS filters */
.embossed {
  background: #e8e4de;
  filter: drop-shadow(2px 2px 0 rgba(255,255,255,0.8))
          drop-shadow(-1px -1px 0 rgba(0,0,0,0.2));
}
/* For the circle cutout: */
.embossed-circle {
  border-radius: 50%;
  background: linear-gradient(135deg, #f5f2ee 0%, #c8c4bc 100%);
  box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2),
              inset 4px 4px 8px rgba(255,255,255,0.8);
}`,
 react:`import { useEffect, useRef } from 'react';
export function EmbossedRelief({ size = 400 }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current, ctx = canvas.getContext('2d');
    const w = size, h = size;
    ctx.fillStyle = '#e8e4de'; ctx.fillRect(0, 0, w, h);
    ctx.save();
    ctx.beginPath(); ctx.arc(w/2, h/2, w*0.46, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = '#e8e4de'; ctx.fillRect(0, 0, w, h);
    const id = ctx.getImageData(0, 0, w, h);
    const eps = 1.5;
    for (let px = 0; px < w; px++) for (let py = 0; py < h; py++) {
      const nx = px/w*6, ny = py/h*6;
      const dxN = fbm(nx+eps, ny, 4) - fbm(nx-eps, ny, 4);
      const dyN = fbm(nx, ny+eps, 4) - fbm(nx, ny-eps, 4);
      const lx = -0.7, ly = -0.7, lz = 0.5;
      const len = Math.sqrt(lx*lx+ly*ly+lz*lz);
      const dot = Math.max(0, Math.min(1, (dxN*lx/len + dyN*ly/len + lz/len) * 1.2));
      const bright = Math.floor(160 + dot * 90);
      const i = (py*w+px)*4;
      id.data[i] = bright; id.data[i+1] = bright-4; id.data[i+2] = bright-8; id.data[i+3] = 255;
    }
    ctx.putImageData(id, 0, 0);
    // stripes
    ctx.globalCompositeOperation = 'overlay';
    for (let s = -10; s < 20; s++) {
      const x = s/12*w*1.5 - w*0.2;
      ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(-Math.PI*0.25);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(-w, x-8, w*2, 12); ctx.restore();
    }
    ctx.restore();
  }, [size]);
  return <canvas ref={ref} width={size} height={size} />;
}`,
 draw(ctx,w,h,t){
  ctx.fillStyle='#d9d5cf';ctx.fillRect(0,0,w,h);
  ctx.save();
  ctx.beginPath();ctx.arc(w/2,h/2,w*.46,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='#e4e0da';ctx.fillRect(0,0,w,h);
  const id=ctx.getImageData(0,0,w,h);const eps=1.5;
  for(let px=0;px<w;px+=2){for(let py=0;py<h;py+=2){
    const nx=px/w*6,ny=py/h*6;
    const dxN=fbm(nx+eps,ny,4)-fbm(nx-eps,ny,4);
    const dyN=fbm(nx,ny+eps,4)-fbm(nx,ny-eps,4);
    const lx=-.7,ly=-.7,lz=.5;const len=Math.sqrt(lx*lx+ly*ly+lz*lz);
    const dot=Math.max(0,Math.min(1,(dxN*lx/len+dyN*ly/len+lz/len)*1.2));
    const bright=Math.floor(155+dot*95);
    for(let a=0;a<2;a++){for(let b=0;b<2;b++){const i=((py+b)*w+(px+a))*4;id.data[i]=bright;id.data[i+1]=bright-3;id.data[i+2]=bright-7;id.data[i+3]=255;}}
  }}
  ctx.putImageData(id,0,0);
  ctx.globalCompositeOperation='overlay';
  ctx.save();ctx.translate(w/2,h/2);ctx.rotate(-Math.PI*.25);
  for(let s=-12;s<22;s++){ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(-w,s/14*w*1.5-6,w*2,10);}
  ctx.restore();ctx.globalCompositeOperation='source-over';ctx.restore();
 }
},

{name:'Gradient Grid',tag:'gradient',mouse:false,
 doc:`Gradient Grid combines a soft multi-point color blob gradient with a faint grid overlay — that signature Framer/Linear aesthetic.

**How it works:** Multiple radial gradient "blobs" are layered with globalCompositeOperation blend modes. A subtle grid is drawn on top at low opacity.

**Customize:**
- Change blob colors in the \`blobs\` array
- Adjust blob \`r\` radius for tighter/looser blends
- Change grid \`spacing\` (default 24px) and \`alpha\` (0.04)
- Set \`animated: false\` to freeze for a static bg

**On a website:**
\`\`\`css
canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -1; }
\`\`\`
Perfect hero section background. Layer a \`backdrop-filter: blur()\` glass card on top.`,
 css:`background:
  radial-gradient(ellipse at 20% 40%, #e05d2088 0%, transparent 50%),
  radial-gradient(ellipse at 70% 30%, #7c3aed88 0%, transparent 50%),
  radial-gradient(ellipse at 50% 80%, #1e1b4b 0%, transparent 60%),
  #0f0a1e;
background-size: 100% 100%;`,
 react:`import { useEffect, useRef } from 'react';
export function GradientGrid() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current, ctx = canvas.getContext('2d');
    const blobs = [
      {x:.25,y:.4,c:'#e05d20',r:.6},{x:.7,y:.25,c:'#7c3aed',r:.55},
      {x:.5,y:.8,c:'#1e40af',r:.5},{x:.1,y:.7,c:'#be185d',r:.4}
    ];
    let raf, t = 0;
    const draw = () => {
      const {width:w,height:h} = canvas;
      ctx.fillStyle = '#0f0a1e'; ctx.fillRect(0,0,w,h);
      blobs.forEach((b,i) => {
        const px=(b.x+Math.sin(t*.3+i)*0.06)*w;
        const py=(b.y+Math.cos(t*.25+i*1.3)*0.06)*h;
        const g=ctx.createRadialGradient(px,py,0,px,py,b.r*Math.min(w,h));
        g.addColorStop(0,b.c+'bb'); g.addColorStop(1,'transparent');
        ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      });
      // grid
      ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
      for(let x=0;x<w;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
      for(let y=0;y<h;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      t+=0.016; raf=requestAnimationFrame(draw);
    };
    draw(); return ()=>cancelAnimationFrame(raf);
  },[]);
  return <canvas ref={ref} width={800} height={500} style={{width:'100%',height:'100%'}} />;
}`,
 draw(ctx,w,h,t){
  const blobs=[{x:.22,y:.38,c:'#e05d20',r:.65},{x:.72,y:.22,c:'#7c3aed',r:.58},{x:.48,y:.78,c:'#1e40af',r:.5},{x:.08,y:.72,c:'#be185d',r:.42}];
  ctx.fillStyle='#0f0a1e';ctx.fillRect(0,0,w,h);
  blobs.forEach((b,i)=>{
    const px=(b.x+Math.sin(t*.3+i)*.06)*w,py=(b.y+Math.cos(t*.25+i*1.3)*.06)*h;
    const g=ctx.createRadialGradient(px,py,0,px,py,b.r*Math.min(w,h));
    g.addColorStop(0,b.c+'bb');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  });
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let x=0;x<w;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
 }
},

{name:'Undertones',tag:'reactive',mouse:true,
 doc:`Undertones is a mouse-reactive dark gradient field — diagonal light streaks shift and glow based on your cursor position. The name refers to the subtle color shifts underneath the surface.

**How it works:** Multiple diagonal "lens" strips are rendered as blurred radial gradients. Mouse position controls which strips are amplified and changes the hue drift. The dark grid adds depth.

**Customize:**
- \`strips\` count → more = denser light field
- \`colors\` array → change from purple/green/pink to any palette
- \`reactivity\` → how strongly mouse moves affect intensity (0–1)
- \`blurAmount\` → softer blurs = dreamier

**On a website:**

export function SwirledLenses({ hue = 220 }) {

      for (let i = 0; i < lines; i++) {

{name:'Resolving Chrome',tag:'abstract',
 doc:`Resolving Chrome is a dark, swirling metallic surface — like liquid metal or oiled fabric. Slow, hypnotic rotation.

**How it works:** FBM noise is used to compute a fake normal map at each pixel, then a single directional light is applied. Time is added to the noise coordinates to make it slowly animate. The result looks like a spinning chrome surface.

**Customize:**
- \`lightDir\` → change light angle for different reflections
- \`noiseScale\` → lower = larger swirls, higher = tighter
- \`saturation\` → 0 = pure monochrome chrome, 0.3 = subtle color cast

{name:'HexGrid',tag:'pattern',doc:`Animated hex grid with distance-based glow from center.\n\n**Customize:** Change hex radius (r=18). Replace the distance glow with mouse proximity. Change stroke color from purple to any accent.\n\n**On a website:** Great for tech/SaaS hero backgrounds. Animate individual hex fill on hover.`,css:`background-color: #0c0c0c;`,react:`// See Canvas JS tab`,draw(ctx,w,h,t){ctx.fillStyle='#0c0c0c';ctx.fillRect(0,0,w,h);const r=18,dx=r*Math.sqrt(3),dy=r*1.5;for(let row=-1;row*dy<h+dy;row++){for(let col=-1;col*dx<w+dx;col++){const x=col*dx+(row%2)*dx*.5,y=row*dy;const dist=Math.sqrt(Math.pow(x-w/2,2)+Math.pow(y-h/2,2));const glow=Math.max(0,1-dist/(Math.min(w,h)*.6));ctx.strokeStyle=`rgba(124,92,252,${.08+glow*.4+.1*Math.sin(t+dist*.02)})`;ctx.lineWidth=.8;ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}ctx.closePath();ctx.stroke();}}}},

{name:'Marble',tag:'texture',doc:`Simulated marble with flowing dark veins using fbm noise distorted sine waves.\n\n**Customize:** Adjust \`veinFreq\` (px*0.02) for tighter or wider veins. Change base color from warm white to any marble color (green, black, pink).\n\n**On a website:** Use as a card or section background. Pair with serif fonts for a luxury feel.`,css:`background: linear-gradient(135deg, #e8e0d5 25%, #d5c9bc 50%, #e8e0d5 75%);`,react:`// See Canvas JS tab`,draw(ctx,w,h,t){const id=ctx.getImageData(0,0,w,h);for(let px=0;px<w;px+=2){for(let py=0;py<h;py+=2){let n=0,a=1,f=.005;for(let o=0;o<6;o++){n+=a*(fbm(px*f,py*f+t*.01,3));a*=.5;f*=2;}const v=Math.sin(px*.02+n*4);const bright=Math.floor(200+v*50);for(let da=0;da<2;da++){for(let db=0;db<2;db++){const i=((py+db)*w+(px+da))*4;id.data[i]=bright;id.data[i+1]=bright-20;id.data[i+2]=bright-40;id.data[i+3]=255;}}}}ctx.putImageData(id,0,0);}},

{name:'ColorWheel',tag:'color',doc:`Spinning color wheel — classic hue display.\n\n**Customize:** Change inner radius for a ring vs solid wheel. Add white center. Slow or reverse rotation.\n\n**On a website:** Color picker UI, palette visualizers, brand color displays.`,css:`background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);border-radius:50%;`,react:`export function ColorWheel({size=300}){return<div style={{width:size,height:size,borderRadius:'50%',background:'conic-gradient(red,yellow,lime,cyan,blue,magenta,red)'}}/>}`,draw(ctx,w,h,t){const id=ctx.getImageData(0,0,w,h);const cx=w/2,cy=h/2,r=Math.min(w,h)*.45;for(let px=0;px<w;px+=2){for(let py=0;py<h;py+=2){const dx=px-cx,dy=py-cy,dist=Math.sqrt(dx*dx+dy*dy);if(dist>r){for(let a=0;a<2;a++){for(let b=0;b<2;b++){const i=((py+b)*w+(px+a))*4;id.data[i]=10;id.data[i+1]=10;id.data[i+2]=10;id.data[i+3]=255;}}continue;}const angle=(Math.atan2(dy,dx)+Math.PI*2+(t*.3))%(Math.PI*2);const hue=angle/(Math.PI*2)*360;const sat=dist/r;const[r2,g,b]=hsl(hue,.9,.4+sat*.2);for(let a=0;a<2;a++){for(let b=0;b<2;b++){const i=((py+b)*w+(px+a))*4;id.data[i]=r2;id.data[i+1]=g;id.data[i+2]=b;id.data[i+3]=255;}}}}ctx.putImageData(id,0,0);}},

{name:'FloatingParticles',tag:'animated',doc:`Floating ambient particles with soft trails.\n\n**Customize:** Change particle count, speed, color hue, and size range. Add mouse repulsion for interactivity.\n\n**On a website:** Hero backgrounds, ambient loaders, dark UI accents.`,css:`background:#08080f;`,react:`// See Canvas JS tab`,draw(ctx,w,h,t){ctx.fillStyle='rgba(8,8,15,.15)';ctx.fillRect(0,0,w,h);if(!ctx._pts){ctx._pts=Array.from({length:40},()=>({x:Math.random()*500,y:Math.random()*300,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:1+Math.random()*2}));}ctx._pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`hsla(${260+t*20},80%,70%,.8)`;ctx.fill();});}},
{name:'Ripples',tag:'animated',doc:`Expanding concentric rings from center.\n\n**Customize:** Change source point (cx,cy) to mouse position for interactive ripples. Change ring color and speed.\n\n**On a website:** Click-triggered effects, ambient loaders, water simulations.`,css:`background:#000;`,react:`// See Canvas JS tab`,draw(ctx,w,h,t){ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);const maxR=Math.max(w,h)*.7;for(let i=0;i<8;i++){const r=((t*.8+i*.8)%(Math.PI*2))/(Math.PI*2)*maxR;ctx.beginPath();ctx.arc(w/2,h/2,r,0,Math.PI*2);ctx.strokeStyle=`rgba(255,255,255,${(1-r/maxR)*.5})`;ctx.lineWidth=1.5;ctx.stroke();}}},

// ── STATE ──────────────────────────────────────────────────────────────────
const START = performance.now();
const getT = () => (performance.now()-START)/1000;
let activeTag = 'all';
let activeTab = 'canvas';
let openShader = null;
let modalCtx = null;
let modalShader = null;
const canvasRefs = [];
const mousePosGlobal = {x:0.5, y:0.5};
const modalMouse = {x:0.5, y:0.5};

// ── FILTERS ────────────────────────────────────────────────────────────────
function buildFilters(){
  const tags=['all',...new Set(SHADERS.map(s=>s.tag))];
  const el=document.getElementById('filters');
  tags.forEach(tag=>{
    const btn=document.createElement('button');
    btn.className='fb'+(tag==='all'?' on':'');
    btn.textContent=tag;
    btn.onclick=()=>{activeTag=tag;document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',b.textContent===tag));buildGrid();};
    el.appendChild(btn);
  });
}

// ── GRID ──────────────────────────────────────────────────────────────────
function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';canvasRefs.length=0;
  const filtered=SHADERS.filter(s=>activeTag==='all'||s.tag===activeTag);
  document.getElementById('cnt').textContent=filtered.length+' shaders';
  filtered.forEach(shader=>{
    const card=document.createElement('div');card.className='card';
    const wrap=document.createElement('div');wrap.className='thumb';
    const cv=document.createElement('canvas');cv.width=320;cv.height=115;
    wrap.appendChild(cv);
    const lbl=document.createElement('div');lbl.className='clabel';
    lbl.innerHTML=`<span class="cname">${shader.name}</span><span class="ctag">${shader.tag}</span>`;
    if(shader.mouse){const b=document.createElement('div');b.className='mouse-badge';b.textContent='mouse';wrap.appendChild(b);}
    card.appendChild(wrap);card.appendChild(lbl);
    card.onclick=()=>openModal(shader);
    g.appendChild(card);
    canvasRefs.push({cv,ctx:cv.getContext('2d'),shader});
  });
}

// ── RENDER LOOP ────────────────────────────────────────────────────────────
function renderLoop(){
  const t=getT();
  canvasRefs.forEach(({cv,ctx,shader})=>{
    try{shader.draw(ctx,cv.width,cv.height,t,mousePosGlobal.x,mousePosGlobal.y);}catch(e){}
  });
  if(modalCtx&&modalShader){
    try{modalShader.draw(modalCtx,modalCtx.canvas.width,modalCtx.canvas.height,t,modalMouse.x,modalMouse.y);}catch(e){}
  }
  requestAnimationFrame(renderLoop);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(shader){
  openShader=shader;
  document.getElementById('m-name').textContent=shader.name;
  document.getElementById('m-tag').textContent=shader.tag;
  const mm=document.getElementById('m-mouse');mm.style.display=shader.mouse?'inline':'none';
  const mc=document.getElementById('m-cv');mc.width=700;mc.height=240;
  modalCtx=mc.getContext('2d');modalShader=shader;
  mc.onmousemove=e=>{const r=mc.getBoundingClientRect();modalMouse.x=(e.clientX-r.left)/r.width;modalMouse.y=(e.clientY-r.top)/r.height;};
  switchTab(activeTab);
  document.getElementById('ov').classList.add('open');
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===tab));
  if(!openShader)return;
  const area=document.getElementById('code-area');
  if(tab==='doc'){
    area.innerHTML=`<div class="doc-block"><h3>${openShader.name} — AI Guide</h3><div id="doc-content"></div></div>`;
    document.getElementById('doc-content').innerHTML=mdToHtml(openShader.doc||'No guide available.');
    return;
  }
  let code='',lang='';
  if(tab==='canvas'){code=buildCanvasCode(openShader);lang='js';}
  else if(tab==='css'){code=openShader.css||'/* No CSS version */';lang='css';}
  else{code=openShader.react||'// No React version';lang='jsx';}
  area.innerHTML=`<div class="code-wrap"><div class="code-hdr"><span class="code-lang">${lang}</span><button class="copy-btn" id="cbtn" onclick="doCopy()">copy</button></div><div class="code-block" id="code-block">${esc(code)}</div></div>`;
}

function buildCanvasCode(s){
  return `// ${s.name} — drop this into any canvas 2D project
// Requires: hsl(), fbm(), hash2(), vnoise() helpers (see lib footer)

const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');
const startTime = performance.now();
${s.mouse?`
// Track mouse position (0–1 normalized)
let mx = 0.5, my = 0.5;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mx = (e.clientX - r.left) / r.width;
  my = (e.clientY - r.top) / r.height;
});`:''}
function draw() {
  const t = (performance.now() - startTime) / 1000;
  const { width: w, height: h } = canvas;
${s.mouse?`  // Pass mx, my into draw — try moving your mouse!\n  shader(ctx, w, h, t, mx, my);`:`  shader(ctx, w, h, t);`}

function hsl(h,s,l){h=((h%360)+360)%360;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let r=0,g=0,b=0;if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];}
function hash2(ax,ay){const s=Math.sin(ax*127.1+ay*311.7)*43758.5453;return s-Math.floor(s);}
function vnoise(ax,ay){const ix=Math.floor(ax),iy=Math.floor(ay),fx=ax-ix,fy=ay-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash2(ix,iy)*(1-ux)*(1-uy)+hash2(ix+1,iy)*ux*(1-uy)+hash2(ix,iy+1)*(1-ux)*uy+hash2(ix+1,iy+1)*ux*uy;}
function fbm(x,y,oct){let v=0,a=1,f=1;for(let i=0;i<oct;i++){v+=a*(vnoise(x*f,y*f)*2-1);a*=.5;f*=2;}return v;}`;

}
